name: Node.js CI/CD

on:
  push:
    tags:
      - "v*"

run-name: 🚀 Build ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm test

      # 👇 Generate SDV link (example)
      - name: Generate SDV Link
        run: echo "https://sdv-${{ github.ref_name }}.com" > sdv.txt

      # 👇 Upload artifact (UNIQUE NAME)
      - name: Upload SDV Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdv-${{ github.ref_name }}
          path: sdv.txt
